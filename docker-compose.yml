networks:
  bank-net:
    external: true

services:

  superset:
    image: apache/superset:3.1.0
    container_name: superset
    restart: unless-stopped
    networks:
      - bank-net
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "super_secret_key_change_in_prod"
    volumes:
      - superset-data:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      bash -c "
        pip install clickhouse-connect google --quiet &&
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@bank.local --password admin || true &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  superset-data: